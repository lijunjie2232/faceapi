services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: face-rec-postgres-prod
    environment:
      POSTGRES_DB: faceapi
      POSTGRES_USER: faceuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - face-rec-network

  # Milvus vector database with GPU support
  etcd:
    container_name: milvus-etcd-prod
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - face-rec-network

  minio:
    container_name: milvus-minio-prod
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - face-rec-network

  standalone:
    container_name: milvus-standalone-prod
    image: milvusdb/milvus:v2.6.11-gpu  # GPU-enabled Milvus image
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - milvus:/var/lib/milvus
    depends_on:
      - "etcd"
      - "minio"
    # GPU runtime configuration for production Milvus
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
              device_ids: ["0"]
    restart: unless-stopped
    networks:
      - face-rec-network

  # Backend service with GPU support
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile-gpu
    container_name: face-rec-backend-prod
    environment:
      - SQL_BACKEND=postgres
      - SQL_HOST=postgres
      - SQL_PORT=5432
      - SQL_USERNAME=faceuser
      - SQL_PASSWORD=${POSTGRES_PASSWORD}
      - SQL_DATABASE=faceapi
      - MILVUS_DB_HOST=standalone
      - MILVUS_DB_PORT=19530
      - MODEL_DEVICE=cuda:0  # Enable CUDA for production
      - SECRET_KEY=${SECRET_KEY}
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=8000
    depends_on:
      postgres:
        condition: service_started
      standalone:
        condition: service_started
    # GPU runtime configuration for production backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
              device_ids: ["0"]
    restart: unless-stopped
    networks:
      - face-rec-network

  # Nginx reverse proxy (single entry point)
  nginx:
    image: nginx:alpine
    container_name: face-rec-nginx
    ports:
      - "${HOST_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
    environment:
      - NGINX_HOST=${DOMAIN_NAME:-localhost}
      - BACKEND_HOST=backend
      - BACKEND_PORT=8000
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - face-rec-network

  # Frontend service (build only)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: face-rec-frontend-builder
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
    command: echo "Frontend built successfully"

volumes:
  postgres_data:
  etcd:
  minio:
  milvus:
  frontend_dist:

networks:
  face-rec-network:
    driver: bridge